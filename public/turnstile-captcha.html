<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Verificación</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; background: #fff; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    #turnstile { display: flex; justify-content: center; width: 100%; min-height: 65px; }
  </style>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>
  <div id="turnstile"></div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var sitekey = params.get("sitekey") || "1x00000000000000000000AA";

      function post(type, token) {
        var payload = JSON.stringify({ type: type, token: token || "" });
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(payload);
        }
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, "*");
        }
      }

      function renderWidget() {
        if (!window.turnstile) {
          setTimeout(renderWidget, 80);
          return;
        }
        window.turnstile.ready(function () {
          window.turnstile.render("#turnstile", {
            sitekey: sitekey,
            callback: function (token) { post("verify", token); },
            "expired-callback": function () { post("expire"); },
            "error-callback": function () { post("error"); },
            theme: "light",
            size: "normal",
          });
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", renderWidget);
      } else {
        renderWidget();
      }
    })();
  </script>
</body>
</html>
