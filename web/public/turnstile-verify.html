<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Verificación de seguridad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f8fafc;
      color: #334155;
    }
    h1 { font-size: 18px; margin-bottom: 16px; text-align: center; }
    #turnstile { min-height: 70px; width: 100%; max-width: 320px; display: flex; justify-content: center; }
    .hint { margin-top: 16px; font-size: 13px; color: #64748b; text-align: center; max-width: 300px; line-height: 1.4; }
    .status { margin-top: 12px; font-size: 14px; color: #0077b6; text-align: center; }
    .error { color: #b91c1c; margin-top: 12px; font-size: 14px; text-align: center; }
  </style>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>
  <h1>Verificación de seguridad</h1>
  <div id="turnstile"></div>
  <p class="hint">Completa el captcha. Al terminar volverás automáticamente a la app.</p>
  <p id="status" class="status" hidden>Redirigiendo a la app…</p>
  <p id="error" class="error" hidden></p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var sitekey = params.get("sitekey") || "1x00000000000000000000AA";
      var redirectRaw = params.get("redirect") || "tecnoticsmobile://turnstile-callback";
      var redirect = redirectRaw;
      try { redirect = decodeURIComponent(redirectRaw); } catch (e) { redirect = redirectRaw; }

      var statusEl = document.getElementById("status");
      var errorEl = document.getElementById("error");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.hidden = false;
      }

      function finish(token) {
        if (!token) { showError("Token vacío."); return; }
        statusEl.hidden = false;
        var sep = redirect.indexOf("?") >= 0 ? "&" : "?";
        var target = redirect + sep + "token=" + encodeURIComponent(token);
        try {
          var link = document.createElement("a");
          link.href = target;
          link.style.display = "none";
          document.body.appendChild(link);
          link.click();
        } catch (e) { /* noop */ }
        window.location.replace(target);
        setTimeout(function () { window.location.href = target; }, 250);
        setTimeout(function () { window.open(target, "_self"); }, 500);
      }

      function renderWidget() {
        if (!window.turnstile) {
          setTimeout(renderWidget, 100);
          return;
        }
        window.turnstile.ready(function () {
          window.turnstile.render("#turnstile", {
            sitekey: sitekey,
            callback: finish,
            "expired-callback": function () { showError("El captcha caducó. Cierra y vuelve a intentar."); },
            "error-callback": function () { showError("No se pudo cargar el captcha. Revisa tu conexión."); },
            theme: "light",
            size: "normal",
          });
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", renderWidget);
      } else {
        renderWidget();
      }
    })();
  </script>
</body>
</html>
